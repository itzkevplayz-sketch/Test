<!DOCTYPE html>
<html lang="en">
<head>
    <title>Advanced Roblox Lobby Exporter</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background-color: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #overlay { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; background: #00c3ff; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,195,255,0.4); transition: 0.2s; }
        button:hover { background: #0099cc; transform: scale(1.05); }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #00c3ff; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>Lobby Structure Pro</h2>
        <p>• Central Pit for Main Obby<br>• Octagonal Viewing Ring<br>• 4 Connected Activity Zones</p>
    </div>
    <div id="controls">
        <button id="export-btn">Download .GLB for Roblox Studio</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 30, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.4));

        // --- STRUCTURAL GENERATION ---
        const lobbyGroup = new THREE.Group();
        const matGray = new THREE.MeshPhongMaterial({ color: 0x444444 });
        const matHighlight = new THREE.MeshPhongMaterial({ color: 0x00c3ff, emissive: 0x004466 });

        // 1. The Octagonal Ring (Viewing Deck)
        const ringGeo = new THREE.TorusGeometry(15, 2, 16, 8); // Octagonal look
        const mainRing = new THREE.Mesh(ringGeo, matGray);
        mainRing.rotation.x = Math.PI / 2;
        mainRing.name = "Viewing_Ring";
        lobbyGroup.add(mainRing);

        // 2. The 4 Activity Platforms (Spawn, Practice, Daily, Cave)
        const platGeo = new THREE.CylinderGeometry(6, 7, 1, 8);
        const positions = [
            { pos: [25, 0, 0], name: "Practice_Platform" },
            { pos: [-25, 0, 0], name: "Daily_Platform" },
            { pos: [0, 0, 25], name: "Spawn_Platform" },
            { pos: [0, 0, -25], name: "Cave_Entrance_Platform" }
        ];

        positions.forEach(p => {
            const plat = new THREE.Mesh(platGeo, matGray);
            plat.position.set(...p.pos);
            plat.name = p.name;
            lobbyGroup.add(plat);

            // Connector Bridge
            const bridgeGeo = new THREE.BoxGeometry(12, 0.5, 4);
            const bridge = new THREE.Mesh(bridgeGeo, matGray);
            bridge.position.set(p.pos[0]/1.8, -0.5, p.pos[2]/1.8);
            bridge.lookAt(0, -0.5, 0);
            lobbyGroup.add(bridge);
        });

        // 3. Central "Pit" Markers
        for(let i = 0; i < 4; i++) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(2, 15, 2), matHighlight);
            const angle = (i / 4) * Math.PI * 2;
            pillar.position.set(Math.cos(angle) * 10, -7.5, Math.sin(angle) * 10);
            lobbyGroup.add(pillar);
        }

        scene.add(lobbyGroup);

        // --- EXPORT ---
        document.getElementById('export-btn').addEventListener('click', () => {
            const exporter = new GLTFExporter();
            exporter.parse(lobbyGroup, (result) => {
                const blob = new Blob([result], { type: 'application/octet-stream' });
                const saveLink = document.createElement('a');
                saveLink.href = URL.createObjectURL(blob);
                saveLink.download = 'Roblox_Lobby_v2.glb';
                saveLink.click();
            }, { binary: true });
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
