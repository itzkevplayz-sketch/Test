<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural HTML Castle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; }
        button { 
            padding: 12px 20px; font-size: 16px; cursor: pointer; 
            background: #4CAF50; color: white; border: none; border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover { background: #45a049; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="export-btn">Download Castle (.gltf)</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(15, 15, 15);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // --- The Castle Logic ---
        const castleGroup = new THREE.Group();
        scene.add(castleGroup);

        const stoneMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x8b0000 });
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x348C31 });

        // Ground
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), grassMat);
        ground.rotation.x = -Math.PI / 2;
        castleGroup.add(ground);

        function createTower(x, z) {
            const tower = new THREE.Group();
            
            // Base cylinder
            const body = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 8, 16), stoneMat);
            body.position.y = 4;
            tower.add(body);

            // Conical Roof
            const roof = new THREE.Mesh(new THREE.ConeGeometry(1.8, 3, 16), roofMat);
            roof.position.y = 9.5;
            tower.add(roof);

            tower.position.set(x, 0, z);
            castleGroup.add(tower);
        }

        function createWall(x, z, rotY, length) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(length, 5, 0.8), stoneMat);
            wall.position.set(x, 2.5, z);
            wall.rotation.y = rotY;
            castleGroup.add(wall);
            
            // Battlements (simplistic)
            for(let i = -length/2 + 0.5; i < length/2; i += 1) {
                const meriton = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.8), stoneMat);
                meriton.position.set(x + (Math.cos(rotY) * i), 5.3, z - (Math.sin(rotY) * i));
                meriton.rotation.y = rotY;
                castleGroup.add(meriton);
            }
        }

        // Build the 4 corners
        createTower(-5, -5);
        createTower(5, -5);
        createTower(5, 5);
        createTower(-5, 5);

        // Build the walls
        createWall(0, -5, 0, 10); // North
        createWall(0, 5, 0, 10);  // South
        createWall(-5, 0, Math.PI / 2, 10); // West
        createWall(5, 0, Math.PI / 2, 10);  // East

        // Keep (Main Building)
        const keep = new THREE.Mesh(new THREE.BoxGeometry(4, 7, 4), stoneMat);
        keep.position.y = 3.5;
        castleGroup.add(keep);

        // --- Export Logic ---
        document.getElementById('export-btn').addEventListener('click', () => {
            const exporter = new GLTFExporter();
            exporter.parse(castleGroup, (gltf) => {
                const output = JSON.stringify(gltf, null, 2);
                save(new Blob([output], { type: 'text/plain' }), 'castle.gltf');
            }, { binary: false });
        });

        function save(blob, filename) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
