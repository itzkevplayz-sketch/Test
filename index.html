<!DOCTYPE html>
<html lang="en">
<head>
    <title>Integrated Lobby Structure Pro-Exporter</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background-color: #1a1a1a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #overlay { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; pointer-events: none; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; background: #00c3ff; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,195,255,0.4); transition: 0.2s; }
        button:hover { background: #0099cc; transform: scale(1.05); }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #00c3ff; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>Lobby Structure Pro-Exporter v2</h2>
        <p>• Octagonal Viewing Ring (Deck/Railings)<br>• Integrated Cliff and Floor Geometry<br>• 4 Connected Activity Platforms</p>
    </div>
    <div id="controls">
        <button id="export-btn">Download .GLB for Roblox Studio</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 40, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.4));

        // --- 2. INTEGRATED STRUCTURAL GENERATION (LOOKS LIKE REFERENCE) ---
        const lobbyGroup = new THREE.Group();
        
        // Custom color palette matching the hand-drawn look
        const matGray = new THREE.MeshPhongMaterial({ color: 0x4a4a4a });
        const matGrave = new THREE.MeshPhongMaterial({ color: 0x666666 });
        const matNeonBlue = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x006666 });
        const matNeonPurp = new THREE.MeshPhongMaterial({ color: 0xff00ff, emissive: 0x660066 });

        // -- 2a. The Main Octagonal Viewing Deck --
        const shape = new THREE.Shape();
        const outerRad = 20;
        const innerRad = 15;
        
        // Define an octagonal ring shape
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = Math.cos(angle);
            const y = Math.sin(angle);
            if (i === 0) shape.moveTo(x * outerRad, y * outerRad);
            else shape.lineTo(x * outerRad, y * outerRad);
        }
        shape.closePath();

        const hole = new THREE.Path();
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = Math.cos(angle);
            const y = Math.sin(angle);
            if (i === 0) hole.moveTo(x * innerRad, y * innerRad);
            else hole.lineTo(x * innerRad, y * innerRad);
        }
        hole.closePath();
        shape.holes.push(hole);

        // Extrude for thickness (The main platform and railings)
        const extrudeSettings = { depth: 4, bevelEnabled: true, bevelThickness: 0.5, bevelSize: 0.5, bevelSegments: 3 };
        const deckGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        const mainPlatform = new THREE.Mesh(deckGeometry, matGray);
        mainPlatform.rotation.x = Math.PI / 2;
        mainPlatform.name = "Viewing_Deck_Main_Platform";
        lobbyGroup.add(mainPlatform);

        // -- 2b. Add Detailed Activity Platforms (Connected) --
        const platGeo = new THREE.CylinderGeometry(8, 9, 1.5, 8); // Matching octagonal feel
        
        // Specific positions for Spawn, Practice, Daily, Cave
        const positions = [
            { pos: [30, 0, 0], name: "Spawnpoint_Island", mat: matGrave },
            { pos: [-30, 0, 0], name: "Practice_Obby_Island", mat: matGrave },
            { pos: [0, 0, 30], name: "Daily_Obby_Island", mat: matGrave },
            { pos: [0, 0, -30], name: "Cave_Entrance_Island", mat: matGrave }
        ];

        positions.forEach(p => {
            const plat = new THREE.Mesh(platGeo, p.mat);
            plat.position.set(...p.pos);
            plat.name = p.name;
            lobbyGroup.add(plat);

            // Detailed "Rockcliff" Extrusions/Connectors (Looks like the reference)
            const bridgeGeo = new THREE.ExtrudeGeometry(new THREE.Shape([
                new THREE.Vector2(-6, -2), new THREE.Vector2(6, -2),
                new THREE.Vector2(4, 2), new THREE.Vector2(-4, 2)
            ]), { depth: 3, bevelEnabled: true, bevelThickness: 0.5 });
            const bridge = new THREE.Mesh(bridgeGeo, matGray);
            bridge.position.set(p.pos[0] / 1.5, -2, p.pos[2] / 1.5);
            bridge.lookAt(0, -2, 0); // Point bridge toward center
            lobbyGroup.add(bridge);
        });

        // -- 2c. Add Central Pit Pillars and Glowing Blocks --
        const obbyGrp = new THREE.Group();
        
        // Large Central obby block
        const mainObby = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), matNeonBlue);
        mainObby.name = "Main_Obby_Central_Cube";
        obbyGrp.add(mainObby);

        // Small floating blocks in a grid pattern
        const blockGeo = new THREE.BoxGeometry(2, 2, 2);
        for(let x = -2; x <= 2; x += 2) {
            for(let y = -2; y <= 2; y += 2) {
                if (Math.abs(x) == 2 && Math.abs(y) == 2) { // Corner blocks
                    const block = new THREE.Mesh(blockGeo, matNeonPurp);
                    block.position.set(x * 3, 0, y * 3);
                    block.name = `Obby_Block_${x}_${y}`;
                    obbyGrp.add(block);
                }
            }
        }
        obbyGrp.position.y = -10; // Lower into the pit
        lobbyGroup.add(obbyGrp);

        scene.add(lobbyGroup);

        // --- 3. EXPORT LOGIC ---
        function exportGLTF() {
            const exporter = new GLTFExporter();
            const options = { binary: true }; // Exports as .glb

            exporter.parse(lobbyGroup, (result) => {
                const blob = new Blob([result], { type: 'application/octet-stream' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'Integrated_Lobby_Structure_v2.glb';
                link.click();
            }, (error) => {
                console.error('An error happened during export:', error);
            }, options);
        }

        document.getElementById('export-btn').addEventListener('click', exportGLTF);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Slowly rotate the central obby complex for show
            obbyGrp.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
