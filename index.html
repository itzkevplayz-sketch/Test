<!DOCTYPE html>
<html lang="en">
<head>
    <title>Roblox Lobby Exporter</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; }
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div id="info">Lobby Prototype - GLTF Exporter for Roblox</div>
    <div id="controls">
        <button id="export-btn">Download .GLB for Roblox Studio</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

        // --- 2. THE LOBBY STRUCTURE (MOCKUP) ---
        // Create an octagonal ring for the lobby
        const ringGeometry = new THREE.RingGeometry(8, 12, 8);
        const ringMaterial = new THREE.MeshPhongMaterial({ color: 0x333333, side: THREE.DoubleSide });
        const lobbyFloor = new THREE.Mesh(ringGeometry, ringMaterial);
        lobbyFloor.rotation.x = -Math.PI / 2;
        lobbyFloor.name = "Lobby_Main_Platform";
        scene.add(lobbyFloor);

        // Add a central "Obby Crystal"
        const crystalGeo = new THREE.OctahedronGeometry(2);
        const crystalMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 });
        const crystal = new THREE.Mesh(crystalGeo, crystalMat);
        crystal.position.y = 2;
        crystal.name = "Central_Crystal";
        scene.add(crystal);

        // --- 3. EXPORT LOGIC ---
        function exportGLTF() {
            const exporter = new GLTFExporter();
            const options = { binary: true }; // Exports as .glb (Better for Roblox)

            exporter.parse(scene, (result) => {
                const blob = new Blob([result], { type: 'application/octet-stream' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'Lobby_Revamp.glb';
                link.click();
            }, (error) => {
                console.error('An error happened during export:', error);
            }, options);
        }

        document.getElementById('export-btn').addEventListener('click', exportGLTF);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            crystal.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
