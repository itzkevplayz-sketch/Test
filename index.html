<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Obby Lobby Inspiration</title>

<style>

body{
margin:0;
overflow:hidden;
background:#9ad7ff;
font-family:sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:white;
padding:8px 12px;
border-radius:8px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
font-weight:bold;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<div id="ui">Drag to orbit • Scroll to zoom</div>

<script>

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x9ad7ff)

const camera = new THREE.PerspectiveCamera(
65,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(60,60,80)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

/* LIGHTING */

scene.add(new THREE.AmbientLight(0xffffff,0.7))

const sun = new THREE.DirectionalLight(0xffffff,1)
sun.position.set(40,60,30)
scene.add(sun)

/* MATERIALS */

const stone = new THREE.MeshStandardMaterial({color:0xd0d0d0})
const grass = new THREE.MeshStandardMaterial({color:0x7bdc7b})
const wood = new THREE.MeshStandardMaterial({color:0x8b5a2b})
const crystalMat = new THREE.MeshStandardMaterial({
color:0x88e6ff,
emissive:0x66ffff,
emissiveIntensity:0.6
})

/* =====================
MAIN ISLAND
===================== */

const island = new THREE.Mesh(
new THREE.CylinderGeometry(50,60,10,64),
grass
)

scene.add(island)

/* =====================
STONE RING WALL
===================== */

for(let i=0;i<40;i++){

const block = new THREE.Mesh(
new THREE.BoxGeometry(4,3,2),
stone
)

let angle = i*(Math.PI*2/40)

block.position.set(
Math.cos(angle)*40,
5,
Math.sin(angle)*40
)

block.lookAt(0,5,0)

scene.add(block)

}

/* =====================
CENTER PIT
===================== */

const pit = new THREE.Mesh(
new THREE.CylinderGeometry(25,25,20,10,true),
new THREE.MeshStandardMaterial({color:0x666666})
)

pit.position.y=-5
scene.add(pit)

/* =====================
CRYSTAL FIELD
===================== */

function crystal(x,y,z){

const geo=new THREE.OctahedronGeometry(
1+Math.random()*3
)

const mesh=new THREE.Mesh(geo,crystalMat)

mesh.position.set(x,y,z)
mesh.rotation.y=Math.random()*Math.PI

scene.add(mesh)

}

for(let i=0;i<120;i++){

crystal(
(Math.random()-0.5)*20,
-4+Math.random()*10,
(Math.random()-0.5)*20
)

}

/* =====================
OBBY STEPS
===================== */

for(let i=0;i<16;i++){

const step=new THREE.Mesh(
new THREE.BoxGeometry(6,1,6),
stone
)

let angle=i*(Math.PI*2/16)

step.position.set(
Math.cos(angle)*18,
-4,
Math.sin(angle)*18
)

scene.add(step)

}

/* =====================
FLOATING PRACTICE OBBY
===================== */

for(let i=0;i<8;i++){

const plat=new THREE.Mesh(
new THREE.BoxGeometry(7,1,7),
stone
)

plat.position.set(
-20+i*5,
25+Math.sin(i)*3,
-10+i*4
)

scene.add(plat)

}

/* =====================
SPAWN AREA
===================== */

const spawnIsland=new THREE.Mesh(
new THREE.CylinderGeometry(10,12,3,32),
grass
)

spawnIsland.position.set(-35,2,-10)
scene.add(spawnIsland)

/* =====================
BENCHES
===================== */

function bench(x,z){

const seat=new THREE.Mesh(
new THREE.BoxGeometry(4,0.5,1),
wood
)

seat.position.set(x,4,z)

const legs1=new THREE.Mesh(
new THREE.BoxGeometry(0.5,1,1),
wood
)

legs1.position.set(x-1.5,3.5,z)

const legs2=legs1.clone()
legs2.position.x=x+1.5

scene.add(seat)
scene.add(legs1)
scene.add(legs2)

}

bench(-30,-5)
bench(30,-5)
bench(-10,35)

/* =====================
DAILY OBBY ISLAND
===================== */

const daily=new THREE.Mesh(
new THREE.CylinderGeometry(18,20,4,32),
grass
)

daily.position.set(0,-2,40)
scene.add(daily)

/* BRIDGES */

for(let i=0;i<8;i++){

const plank=new THREE.Mesh(
new THREE.BoxGeometry(3,0.4,2),
wood
)

plank.position.set(
(i-4)*3,
0,
25
)

scene.add(plank)

}

/* =====================
WATERFALLS
===================== */

const waterMat=new THREE.MeshStandardMaterial({
color:0x66ccff,
transparent:true,
opacity:0.7
})

for(let i=0;i<3;i++){

const fall=new THREE.Mesh(
new THREE.PlaneGeometry(6,15),
waterMat
)

fall.position.set(
-6+i*6,
-5,
48
)

fall.rotation.x=-Math.PI/2

scene.add(fall)

}

/* =====================
CAVE CLIFF
===================== */

const cliff=new THREE.Mesh(
new THREE.BoxGeometry(20,18,16),
new THREE.MeshStandardMaterial({color:0x555555})
)

cliff.position.set(38,0,8)
scene.add(cliff)

/* CAVE ENTRANCE */

const cave=new THREE.Mesh(
new THREE.CylinderGeometry(4,4,10,16,true),
new THREE.MeshStandardMaterial({color:0x222222})
)

cave.rotation.z=Math.PI/2
cave.position.set(48,0,8)

scene.add(cave)

/* =====================
MINECART RAILS
===================== */

for(let i=0;i<20;i++){

const rail=new THREE.Mesh(
new THREE.BoxGeometry(2,0.3,0.3),
wood
)

rail.position.set(
35+i*1.5,
-4,
8
)

scene.add(rail)

}

/* =====================
PLANTS
===================== */

function plant(x,z){

const bush=new THREE.Mesh(
new THREE.ConeGeometry(1.5,3,8),
new THREE.MeshStandardMaterial({color:0x3aa63a})
)

bush.position.set(x,4,z)

scene.add(bush)

}

for(let i=0;i<30;i++){

plant(
(Math.random()-0.5)*70,
(Math.random()-0.5)*70
)

}

/* =====================
ANIMATE
===================== */

function animate(){

requestAnimationFrame(animate)

controls.update()

renderer.render(scene,camera)

}

animate()

/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(
window.innerWidth,
window.innerHeight
)

})

</script>

</body>
</html>
